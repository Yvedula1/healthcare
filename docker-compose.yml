# Local end-to-end run of the containerized app (backend + frontend + PostgreSQL).
# Usage:  DB_PASSWORD=postgres docker compose up --build
#   Frontend -> http://localhost:8081
#   Backend  -> http://localhost:8080
# The DB container publishes on host port 5433 to avoid clashing with a local
# PostgreSQL on 5432.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: caretrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - caretrack_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/caretrack
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      FRONTEND_ORIGIN: http://localhost:8081
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  caretrack_pgdata:
