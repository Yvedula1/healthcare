spring.application.name=caretrack

# --- Datasource ---
# Password is NOT hardcoded. Provide it via the DB_PASSWORD environment variable.
# The URL can be given directly via DB_URL, or assembled from DB_HOST/DB_PORT/DB_NAME
# (handy for managed providers like Render that expose host/port/db separately).
# DB_PARAMS allows appending e.g. "?sslmode=require" when the provider needs SSL.
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:caretrack}${DB_PARAMS:}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Schema is generated/updated by Hibernate (no Flyway/Liquibase, per requirements).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Web ---
server.port=8080

# CORS origin for the Vite dev server (overridable via env)
caretrack.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
