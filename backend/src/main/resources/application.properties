spring.application.name=caretrack

# --- Datasource (local PostgreSQL) ---
# Password is NOT hardcoded. Provide it via the DB_PASSWORD environment variable.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/caretrack}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Schema is generated/updated by Hibernate (no Flyway/Liquibase, per requirements).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Web ---
server.port=8080

# CORS origin for the Vite dev server (overridable via env)
caretrack.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
