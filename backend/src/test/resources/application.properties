# Test profile: real local PostgreSQL, against a dedicated caretrack_test database
# (so tests exercise the same engine as production and never touch the dev DB).
# Password is taken from the DB_PASSWORD env var, never hardcoded.
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/caretrack_test}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Build a fresh schema for the test run and drop it afterwards.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

caretrack.cors.allowed-origin=http://localhost:5173
